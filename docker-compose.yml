version: '3.8'

services:
  catalog.api:
    image: catalogapi
    build:
      context: .
      dockerfile: services/catalog/Catalog.API/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - catalogdb
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      DatabaseSettings__ConnectionString: mongodb://catalogdb:27017
      DatabaseSettings__DatabaseName: CatalogDb
      DatabaseSettings__BrandsCollection: Brands
      DatabaseSettings__TypesCollection: Types
      DatabaseSettings__ProductsCollection: Products

  catalogdb:
    image: mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - catalogdata:/data/db

  basketdb:
    image: redis:alpine
    container_name: basketdb
    restart: always
    ports:
      - "6379:6379"

  discountdb:
    image: postgres:16
    container_name: discountdb
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: Password@1
      POSTGRES_DB: DiscountDb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
       test: ["CMD-SHELL","pg_isready -U admin -d DiscountDb"]
       interval: 10s
       timeout: 5s
       retries: 5
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@pgadmin.org
      PGADMIN_DEFAULT_PASSWORD: Password@1
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/root/.pgadmin
  basket.api:
    image: ${DOCKER_REGISTRY-}basketapi
    build:
      context: .
      dockerfile: services/Basket/Basket.API/Dockerfile
    ports:
      - "8082:8080"
    depends_on:
      - basketdb
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      CacheSettings__connectionString: basketdb:6379
      GrpcSettings__DiscountUrl: http://discount.api:8080
  discount.api:
    image: ${DOCKER_REGISTRY-}discountapi
    build:
      context: .
      dockerfile: services/Discount/Discount.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      DatabaseSettings__ConnectionString: Server=discountdb;Port=5432;Database=DiscountDb;User Id=admin;Password=Password@1
    container_name: discount.api
    depends_on:
        discountdb:
           condition: service_healthy
    ports:
     - "8084:8080"

volumes:
  catalogdata:
  postgres_data:
  pgadmin_data: